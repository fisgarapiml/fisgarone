<!DOCTYPE html>
<html lang="pt-br">
<head>
  <title>Gerenciar Usuários - Sistema Fisgar</title>
  <link rel="stylesheet" href="{{ url_for('usuarios.static', filename='css/login.css') }}">
</head>
<body>
  <div class="login-container">
    <h1>Usuários Cadastrados</h1>
    <a href="{{ url_for('usuarios.novo_usuario') }}" class="btn-novo">Novo Usuário</a>
    <table>
      <thead><tr><th>Nome</th><th>Email</th><th>Tipo</th><th>Data Cadastro</th></tr></thead>
      <tbody>
        {% for u in usuarios %}
        <tr><td>{{u.nome}}</td><td>{{u.email}}</td><td>{{u.tipo}}</td><td>{{u.data_cadastro}}</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</body>
</html>
