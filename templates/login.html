<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>Login | FisgarOne</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <!-- Ícones (para olhinho) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Estilo -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>
  <div class="login-container">
  <div class="fisgar-logo-bar">
    <img src="{{ url_for('static', filename='img/logofisgar.png') }}" alt="Fisgar Logo" class="fisgar-logo" />
  </div>
  <h1>FisgarOne</h1>
  <h2>Entrar</h2>
  <!-- ...restante do formulário... -->
</div>

      <form method="post" autocomplete="off" id="login-form">
        <div class="input-group">
          <input type="email" name="email" placeholder="E-mail" required autofocus>
        </div>
        <div class="input-group senha-group">
          <input type="password" name="senha" id="senha" placeholder="Senha" required>
          <button type="button" class="senha-toggle" tabindex="-1" aria-label="Mostrar/ocultar senha">
            <i class="bi bi-eye"></i>
          </button>
        </div>
        <div class="actions-row">
          <a href="{{ url_for('usuarios.esqueci_senha') }}" class="link-aux">Esqueci a senha</a>
        </div>
        <button type="submit" class="btn-login">Entrar</button>
      </form>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for cat, msg in messages %}
            <div class="alert {{cat}}">{{msg}}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}
      <footer class="login-footer">
        <span>&copy; {{ now.year }} Grupo Fisgar</span>

      </footer>
    </div>
  </div>
  <script>
    // Visualizador de senha
    document.querySelector('.senha-toggle').addEventListener('click', function() {
      const senhaInput = document.getElementById('senha');
      if (senhaInput.type === 'password') {
        senhaInput.type = 'text';
        this.innerHTML = '<i class="bi bi-eye-slash"></i>';
      } else {
        senhaInput.type = 'password';
        this.innerHTML = '<i class="bi bi-eye"></i>';
      }
    });
    // Enter envia o formulário (opcional, já funciona pelo navegador)
    document.getElementById('login-form').addEventListener('submit', function(){
      document.querySelector('.btn-login').innerHTML = '<span class="spin"></span> Entrando...';
    });
  </script>
</body>
</html>
