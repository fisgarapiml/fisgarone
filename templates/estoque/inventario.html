<html><head><title>Inventário</title><link rel='stylesheet' href='/static/css/tema_fisgar.css'></head><body>
<aside class='menu'>
<h2>Estoque</h2>
<a href='/estoque'>Dashboard</a>
<a href='/estoque/inventario'>Inventário</a>

</aside>
<main>
<h1>Inventário</h1>

</tr>{% endfor %}
</table>
</main>
</body></html>
