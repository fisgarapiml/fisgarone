<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FisgarOne - {% block title %}Painel de Controle{% endblock %}</title>

    <!-- SEUS LINKS ATUAIS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- CSS PADRÃO DO SISTEMA -->
    <link rel="stylesheet" href="/static/css/styles.css">

    <!-- BLOCO PARA CSS ESPECÍFICO DE CADA PÁGINA -->
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container-fluid"> <!-- Alterado para container-fluid (como no seu código) -->
        <!-- BARRA LATERAL -->
        <aside class="sidebar bg-dark"> <!-- Adicione suas classes de cor aqui -->
            <div class="sidebar-header">
                <img src="/static/images/logo.png" alt="Logo FisgarOne" class="logo img-fluid">
            </div>
            <nav>
                <ul class="menu">
                    <li>
                        <a href="/" class="text-light"> <!-- Classes de cor/texto -->
                            <i class="fas fa-home me-2"></i>Home
                        </a>
                    </li>
                    <li>
                        <a href="/financeiro" class="text-light">
                            <i class="fas fa-money-bill-wave me-2"></i>Financeiro
                        </a>
                    </li>
                    <li>
                        <a href="/estoque" class="text-light">
                            <i class="fas fa-boxes me-2"></i>Estoque
                        </a>
                    </li>
                    <li>
                        <a href="/nfe" class="text-light">
                            <i class="fas fa-file-invoice me-2"></i>NF-e
                        </a>
                    </li>
                    <li>
                        <a href="/produtos" class="text-light">
                            <i class="fas fa-tags me-2"></i>Produtos
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- CONTEÚDO PRINCIPAL -->
        <main class="content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- RODAPÉ -->
    <footer class="bg-dark text-light p-3"> <!-- Classes de estilo -->
        <p class="mb-0 text-center">Sistema FisgarOne © {% now 'Y' %}</p>
    </footer>

    <!-- SCRIPTS GLOBAIS -->
    <script src="/static/js/main.js"></script>

    <!-- BLOCO PARA SCRIPTS ESPECÍFICOS -->
    {% block extra_js %}{% endblock %}
</body>
</html>
