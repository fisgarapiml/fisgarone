<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FisgarOne | {% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Sistema de Cores - Modo Claro */
            --sidebar-bg-light: #f5f5f5;
            --sidebar-text-light: #2d3748;
            --sidebar-primary-light: #2b6cb0;
            --sidebar-hover-light: #f7fafc;
            --sidebar-border-light: #e2e8f0;
            --sidebar-active-light: #ebf4ff;

            /* Sistema de Cores - Modo Escuro */
            --sidebar-bg-dark: #1a202c;
            --sidebar-text-dark: #e2e8f0;
            --sidebar-primary-dark: #63b3ed;
            --sidebar-hover-dark: #2d3748;
            --sidebar-border-dark: #4a5568;
            --sidebar-active-dark: #2c5282;

            /* Cores Globais */
            --accent: #4299e1;
            --status-paid: #48bb78;
            --status-pending: #ed8936;
            --status-overdue: #f56565;

            /* Variáveis Ativas (Tema) */
            --sidebar-bg: var(--sidebar-bg-light);
            --sidebar-text: var(--sidebar-text-light);
            --sidebar-primary: var(--sidebar-primary-light);
            --sidebar-hover: var(--sidebar-hover-light);
            --sidebar-border: var(--sidebar-border-light);
            --sidebar-active: var(--sidebar-active-light);
        }

        /* Estrutura da Barra Lateral */
        .sidebar {
            width: 250px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--sidebar-border);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .sidebar-header {
            padding: 30px;
            border-bottom: 1px solid var(--sidebar-border);
        }

        .logo-img {
            height: 140px;
            width: auto;
            max-width: 180px;
            object-fit: contain;
            transition: all 0.3s;
        }

        /* Menu Navegação */
        .menu {
            flex: 1;
            overflow-y: auto;
            padding: 25px 0;
        }

        .menu-group {
            margin-bottom: 25px;
        }

        .menu-group-title {
            color: var(--sidebar-text);
            opacity: 0.7;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 0 20px 8px;
            margin-top: 10px;
        }

        .menu-items {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .menu-item {
            position: relative;
        }

        .menu-link {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            color: var(--sidebar-text);
            text-decoration: none;
            transition: all 0.2s;
            font-size: 0.95rem;
        }

        .menu-link:hover {
            background-color: var(--sidebar-hover);
        }

        .menu-link i {
            color: var(--sidebar-primary);
            width: 24px;
            text-align: center;
            margin-right: 12px;
            font-size: 1.6rem;
        }

        .menu-item.active .menu-link {
            background-color: var(--sidebar-active);
            color: var(--sidebar-primary);
            font-weight: 500;
        }

        .menu-item.active .menu-link i {
            color: var(--sidebar-primary);
        }

        /* Submenu */
        .submenu {
            list-style: none;
            padding-left: 20px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .submenu.show {
            max-height: 500px;
        }

        .submenu-item a {
            display: block;
            padding: 10px 20px 10px 44px;
            color: var(--sidebar-text);
            text-decoration: none;
            font-size: 0.99rem;
            position: relative;
        }

        .submenu-item a:before {
            content: "";
            position: absolute;
            left: 32px;
            top: 50%;
            width: 6px;
            height: 6px;
            background-color: var(--sidebar-primary);
            border-radius: 50%;
            transform: translateY(-50%);
            opacity: 0.5;
        }

        .submenu-item a:hover {
            color: var(--sidebar-primary);
        }

        /* Rodapé e Tema */
        .sidebar-footer {
            padding: 15px;
            border-top: 1px solid var(--sidebar-border);
        }

        .theme-switcher {
            display: flex;
            border-radius: 8px;
            overflow: hidden;
            margin: 10px 0;
            border: 1px solid var(--sidebar-border);
        }

        .theme-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--sidebar-text);
            transition: all 0.2s;
        }

        .theme-btn.active {
            background-color: var(--sidebar-active);
            color: var(--sidebar-primary);
        }

        .theme-btn i {
            margin-right: 6px;
        }

        /* Conteúdo Principal */
        .main-content {
            margin-left: 250px;
            min-height: 100vh;
            transition: margin-left 0.3s;
        }

        /* Tema Escuro */
        body.dark-theme {
            --sidebar-bg: var(--sidebar-bg-dark);
            --sidebar-text: var(--sidebar-text-dark);
            --sidebar-primary: var(--sidebar-primary-dark);
            --sidebar-hover: var(--sidebar-hover-dark);
            --sidebar-border: var(--sidebar-border-dark);
            --sidebar-active: var(--sidebar-active-dark);
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Barra Lateral -->
    <div class="sidebar">
        <div class="sidebar-header">
            <a href="{{ url_for('bp_home.index') }}" class="logo">
                <img src="{{ url_for('static', filename='images/logofisgar.png') }}" alt="FisgarOne Logo" class="logo-img">
            </a>
        </div>

        <nav class="menu" id="main-menu">
            <!-- Menu dinâmico será injetado aqui -->
        </nav>

        <div class="sidebar-footer">
            <div class="theme-switcher">
                <button class="theme-btn" id="light-theme">
                    <i class="fas fa-sun"></i>
                    <span>Claro</span>
                </button>
                <button class="theme-btn active" id="dark-theme">
                    <i class="fas fa-moon"></i>
                    <span>Escuro</span>
                </button>
            </div>

            <div class="user-profile">
                <div class="user-avatar">AD</div>
                <div class="user-info">
                    <div class="user-name">Admin User</div>
                    <div class="user-role">Administrador</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Conteúdo Principal -->
    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        // Controle do Tema
        const lightBtn = document.getElementById('light-theme');
        const darkBtn = document.getElementById('dark-theme');

        function setLightTheme() {
            document.body.classList.remove('dark-theme');
            lightBtn.classList.add('active');
            darkBtn.classList.remove('active');
            localStorage.setItem('theme', 'light');
        }

        function setDarkTheme() {
            document.body.classList.add('dark-theme');
            darkBtn.classList.add('active');
            lightBtn.classList.remove('active');
            localStorage.setItem('theme', 'dark');
        }

        lightBtn.addEventListener('click', setLightTheme);
        darkBtn.addEventListener('click', setDarkTheme);

        // Verificar tema salvo
        if (localStorage.getItem('theme') === 'light') {
            setLightTheme();
        } else {
            setDarkTheme();
        }

        // Menu dinâmico (exemplo simplificado)
        const menuData = [
            {
                titulo: "Principal",
                itens: [
                    { nome: "Dashboard", icone: "fas fa-home", url: "/dashboard" },
                    { nome: "Vendas", icone: "fas fa-shopping-cart", url: "/vendas" },
                    {
                        nome: "Financeiro",
                        icone: "fas fa-chart-line",
                        submenu: [
                            { nome: "Contas a Pagar", url: "/financeiro/contas-pagar" },
                            { nome: "Contas a Receber", url: "/financeiro/contas-receber" }
                        ]
                    }
                ]
            }
        ];

        renderMenu(menuData);

        function renderMenu(data) {
            const menuContainer = document.getElementById('main-menu');
            menuContainer.innerHTML = '';

            data.forEach(group => {
                const groupHTML = `
                    <div class="menu-group">
                        <div class="menu-group-title">${group.titulo}</div>
                        <ul class="menu-items">
                            ${group.itens.map(item => `
                                <li class="menu-item ${item.submenu ? 'has-submenu' : ''}">
                                    <a href="${item.url || '#'}" class="menu-link">
                                        <i class="${item.icone}"></i>
                                        <span>${item.nome}</span>
                                        ${item.submenu ? '<i class="fas fa-chevron-down dropdown-icon"></i>' : ''}
                                    </a>
                                    ${item.submenu ? `
                                    <ul class="submenu">
                                        ${item.submenu.map(subItem => `
                                            <li class="submenu-item">
                                                <a href="${subItem.url}">${subItem.nome}</a>
                                            </li>
                                        `).join('')}
                                    </ul>
                                    ` : ''}
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                `;
                menuContainer.insertAdjacentHTML('beforeend', groupHTML);
            });

            // Interações do menu
            document.querySelectorAll('.has-submenu > .menu-link').forEach(item => {
                item.addEventListener('click', function(e) {
                    if (this.getAttribute('href') === '#') {
                        e.preventDefault();
                    }
                    const submenu = this.nextElementSibling;
                    submenu.classList.toggle('show');
                });
            });
        }
    });
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
